name: Daily Affinity Last Contact Alert

on:
  schedule:
    # Fires once daily at 07:30 UTC.
    # That is 09:30 Berlin in summer (CEST) and 08:30 Berlin in winter (CET).
    # The script no longer gates on a specific hour, so DST drift is fine.
    # :30 (not :00) reduces GitHub Actions cron delay during peak load.
    - cron: "30 7 * * *"
  workflow_dispatch:      # allows manual run from the GitHub UI

jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert script
        env:
          TZ: Europe/Berlin
          AFFINITY_API_KEY: ${{ secrets.AFFINITY_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python affinity_last_contact_alert.py
